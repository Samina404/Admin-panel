<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Aura Hotel Admin</title>
    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css?v=20260313">
</head>

<body class="gallery-page">

    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="bg-primary rounded-2 p-2 me-2 d-flex align-items-center justify-content-center"
                    style="width: 36px; height: 36px;">
                    <span class="text-white fw-bold h5 mb-0 font-serif">A</span>
                </div>
                <h5 class="mb-0 fw-bold">Aura Hotel</h5>
            </div>

            <div class="menu-label py-2">Main Menu</div>
            <nav class="flex-grow-1">
                <a href="index.html" class="nav-link">
                    <i class="bi bi-grid-fill"></i> Dashboard
                </a>
                <a href="categories.html" class="nav-link">
                    <i class="bi bi-tag"></i> Categories
                </a>
                <a href="rooms.html" class="nav-link">
                    <i class="bi bi-door-open"></i> Room Management
                </a>
                <a href="bookings.html" class="nav-link">
                    <i class="bi bi-calendar-event"></i> Booking management
                </a>
                <a href="gallery.html" class="nav-link active">
                    <i class="bi bi-images"></i> Gallery
                </a>
                <a href="settings.html" class="nav-link">
                    <i class="bi bi-gear"></i> Website Settings
                </a>
                <a href="users.html" class="nav-link">
                    <i class="bi bi-people"></i> Users Management
                </a>
            </nav>

            <div class="logout-container border-0 pb-4">
                <a href="login.html" class="nav-link text-muted">
                    <i class="bi bi-box-arrow-left"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn d-lg-none" id="sidebar-toggle">
                        <i class="bi bi-list fs-3"></i>
                    </button>
                    <div class="search-box d-none d-md-flex">
                        <i class="bi bi-search"></i>
                        <input type="text" id="global-search" placeholder="Search everywhere...">
                    </div>
                </div>

                <div class="d-flex align-items-center gap-4">
                    <div class="position-relative cursor-pointer">
                        <i class="bi bi-bell fs-5 text-muted"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                            style="font-size: 8px;">
                            2
                        </span>
                    </div>
                    <div class="d-flex align-items-center gap-3 ps-3 border-start">
                        <div class="text-end d-none d-sm-block">
                            <p class="mb-0 fw-bold h6 text-main" style="font-size: 14px;">Asif Admin</p>
                            <small class="text-muted" style="font-size: 11px;">Super Admin</small>
                        </div>
                        <img src="assets/img/profile.jpg" alt="profile" class="rounded-circle"
                            style="width: 42px; height: 42px; object-fit: cover;">
                    </div>
                </div>
            </header>

            <!-- Gallery Body -->
            <section class="p-4 p-lg-5">
                <header class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-5">
                    <div>
                        <h1 class="page-title h2 mb-2">Gallery</h1>
                        <p class="page-subtitle mb-0">Manage website images</p>
                    </div>
                    <button class="upload-btn">
                        <i class="bi bi-plus-lg"></i>
                        <span>Upload Images</span>
                    </button>
                </header>

                <div class="gallery-grid" id="gallery-container">
                    <!-- Dynamic Data Loader via data-handler.js -->
                </div>
            </section>
            
            <!-- Footer -->
            <footer class="p-4 text-center border-top mt-auto">
                <p class="text-muted small mb-0">
                    &copy; 2026 Admin Panel - AyraHotel. All rights reserved.
                </p>
            </footer>
        </main>
    </div>

    <!-- JS Dependencies -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data-handler.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
