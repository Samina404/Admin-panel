<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Aura Hotel Admin</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css?v=20260312">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --aura-primary: #00796b;
            --aura-primary-dark: #004d40;
            --aura-primary-soft: #e0f2f1;
            --aura-bg: #f9fafb;
            --aura-text: #111827;
            --aura-text-muted: #6b7280;
            --aura-border: #e5e7eb;
            --aura-white: #ffffff;
            --aura-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            --aura-radius: 20px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--aura-bg);
            color: var(--aura-text);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .login-wrapper {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Logo Styling */
        .brand-logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
            width: 100%;
        }

        .logo-box {
            width: 38px;
            height: 38px;
            background-color: var(--aura-primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 12px -3px rgba(0, 121, 107, 0.2);
            flex-shrink: 0;
        }

        .logo-box span {
            color: var(--aura-white);
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0;
            letter-spacing: -0.2px;
        }

        /* Card Styling */
        .login-card {
            background: var(--aura-white);
            border-radius: 20px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 385px;
            padding: 32px;
            border: 1px solid rgba(0, 0, 0, 0.02);
            box-sizing: border-box;
        }

        .login-header {
            margin-bottom: 24px;
            text-align: center;
        }

        .login-header h1 {
            font-family: 'Inter', serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #111827;
        }

        .login-header p {
            color: var(--aura-text-muted);
            font-size: 14px;
            margin: 0;
            opacity: 0.75;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #4b5563;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            color: #9ca3af;
            width: 16px;
            height: 16px;
            pointer-events: none;
        }

        .form-control {
            height: 44px;
            background: #fff;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            padding: 0 16px 0 42px;
            font-size: 14px;
            color: var(--aura-text);
            transition: all 0.2s ease;
            box-shadow: none !important;
        }

        .form-control::placeholder {
            color: #9ca3af;
            opacity: 0.7;
        }

        .form-control:focus {
            background: var(--aura-white);
            border-color: #cbd5e1;
            box-shadow: 0 0 0 4px rgba(0, 121, 107, 0.05) !important;
        }

        /* Button Styling */
        .btn-login {
            width: 100%;
            height: 44px;
            background-color: var(--aura-primary);
            border: none;
            border-radius: 10px;
            color: var(--aura-white);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }

        .btn-login:hover {
            background-color: var(--aura-primary-dark);
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            color: var(--aura-primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .back-link:hover {
            color: var(--aura-primary-dark);
        }

        .back-link i {
            width: 14px;
            height: 14px;
        }

        /* Footer */
        .login-footer {
            margin-top: 32px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .copyright {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.6;
            margin: 0;
            display: block;
            width: 100%;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .brand-logo-container {
            animation: fadeIn 0.6s ease-out 0.1s both;
        }

        /* Responsive */
        @media (max-width: 576px) {
            .login-card {
                padding: 24px;
            }

            .brand-name {
                font-size: 21px;
            }

            .login-header h1 {
                font-size: 21px;
            }
        }
    </style>
</head>

<body>

    <div class="login-wrapper">
        <!-- Brand Logo Area -->
        <div class="brand-logo-container">
            <div class="logo-box">
                <span>H</span>
            </div>
            <h1 class="brand-name">Aura Hotel Admin</h1>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <div class="login-header">
                <h1>Reset Password</h1>
                <p>Enter your email and we'll send you a reset link.</p>
            </div>

            <form id="reset-form">
                <!-- Email Field -->
                <div class="form-group">
                    <label class="form-label" for="email">Email address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" id="email" class="form-control" placeholder="admin@aurahotel.com" required
                            autocomplete="email">
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-login">
                    Send Reset Link
                </button>

                <!-- Back to Login -->
                <a href="login.html" class="back-link">
                    <i data-lucide="move-left"></i>
                    Back to login
                </a>
            </form>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <p class="copyright">
                © 2026 Designed & Developed By King Sparrow Group Of Companies PVT LTD. All rights reserved.
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        $(document).ready(function () {
            $('#reset-form').on('submit', function (e) {
                e.preventDefault();

                // Add loading state to button
                const $btn = $('.btn-login');
                $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Sending...');

                // Simulate brief delay
                setTimeout(function () {
                    window.location.href = 'check-email.html';
                }, 1200);
            });

            // Smooth focus effects
            $('.form-control').on('focus', function () {
                $(this).closest('.input-wrapper').find('.input-icon').css('color', 'var(--aura-primary)');
            }).on('blur', function () {
                $(this).closest('.input-wrapper').find('.input-icon').css('color', '#9ca3af');
            });
        });
    </script>
</body>

</html>
