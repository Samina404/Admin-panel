<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management | Aura Hotel Admin</title>
    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css?v=20260313">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
        }

        .user-card {
            background: var(--white);
            border-radius: 22px;
            border: 1px solid #e2e8f0;
            padding: 32px 26px;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .user-card:hover {
            border-color: rgba(0, 150, 137, 0.25);
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .user-header-content {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 24px;
            flex-shrink: 0;
            border: 1px solid #e2e8f0;
        }

        .user-info {
            flex-grow: 1;
        }

        .user-name {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .user-role {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--primary);
        }

        .status-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-active {
            background-color: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .badge-inactive {
            background-color: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }

        .user-divider {
            height: 1px;
            background-color: #f1f5f9;
            margin: 20px 0;
        }

        .user-email {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-actions {
            display: flex;
            gap: 12px;
        }

        .btn-edit {
            flex: 1;
            background: white;
            border: 1px solid #e2e8f0;
            color: #475569;
            font-weight: 600;
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-edit:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            color: #1e293b;
        }

        .btn-disable {
            flex: 1;
            background: #fff1f2;
            border: 1px solid #fecdd3;
            color: #e11d48;
            font-weight: 600;
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-disable:hover {
            background: #ffe4e6;
            transform: translateY(-1px);
        }

        /* Add User Form Redesign */
        .add-user-container {
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid #e5e7eb;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .add-user-title {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 30px;
        }

        .form-label-custom {
            font-size: 15px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 10px;
            display: block;
        }

        .form-control-custom {
            background-color: #ffffff;
            border: 1.5px solid #e5e7eb;
            border-radius: 14px;
            padding: 14px 20px;
            font-size: 15px;
            color: #111827;
            transition: all 0.2s;
            width: 100%;
        }

        .form-control-custom:focus {
            outline: none;
            border-color: #009689;
            box-shadow: 0 0 0 4px rgba(0, 150, 137, 0.1);
        }

        .form-control-custom::placeholder {
            color: #9ca3af;
        }

        .form-select-custom {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.5em 1.5em;
        }

        .btn-cancel-custom {
            background: #ffffff;
            border: 1.5px solid #e5e7eb;
            border-radius: 14px;
            color: #374151;
            font-weight: 600;
            padding: 12px 30px;
            font-size: 16px;
            transition: all 0.2s;
        }

        .btn-cancel-custom:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }

        .btn-create-custom {
            background: #00796b;
            border: none;
            border-radius: 14px;
            color: #ffffff;
            font-weight: 600;
            padding: 12px 30px;
            font-size: 16px;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 121, 107, 0.2);
        }

        .btn-create-custom:hover {
            background: #00695c;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 121, 107, 0.3);
        }

        .btn-add-user {
            background-color: #00796b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            font-size: 15px;
        }

        .btn-add-user:hover {
            background-color: #00695c;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 121, 107, 0.2);
            color: white;
        }
    </style>
</head>

<body class="users-page">

    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="rounded-2 me-2 d-flex align-items-center justify-content-center"
                    style="width: 32px; height: 32px; background-color: #00796b;">
                    <span class="text-white fw-bold h5 mb-0 font-serif" style="font-size: 18px;">A</span>
                </div>
                <h4 class="mb-0 fw-bold font-serif" style="color: #00796b; font-size: 22px;">Aura Hotel</h4>
            </div>

            <div class="menu-label py-2">Main Menu</div>
            <nav class="flex-grow-1">
                <a href="index.html" class="nav-link">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="categories.html" class="nav-link">
                    <i data-lucide="tag"></i> Categories
                </a>
                <a href="rooms.html" class="nav-link">
                    <i data-lucide="door-open"></i> Room Management
                </a>
                <a href="bookings.html" class="nav-link">
                    <i data-lucide="calendar-days"></i> Booking management
                </a>
                <a href="gallery.html" class="nav-link">
                    <i data-lucide="image"></i> Gallery
                </a>
                <a href="settings.html" class="nav-link">
                    <i data-lucide="settings"></i> Website Settings
                </a>
                <a href="users.html" class="nav-link active">
                    <i data-lucide="users"></i> Users Management
                </a>
            </nav>

            <div class="logout-container border-0 pb-4">
                <a href="login.html" class="nav-link text-muted">
                    <i data-lucide="log-out"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn d-lg-none" id="sidebar-toggle">
                        <i data-lucide="menu"></i>
                    </button>
                    <div class="search-box">
                        <i data-lucide="search" style="width: 18px; color: #94a3b8;"></i>
                        <input type="text" id="global-search" placeholder="Search everywhere...">
                    </div>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <div class="position-relative cursor-pointer p-2 rounded-circle hover-bg-light">
                        <i data-lucide="bell" style="width: 20px; color: #64748b;"></i>
                        <span class="position-absolute translate-middle p-1 bg-danger border border-light rounded-circle"
                            style="top: 25%; left: 75%;">
                        </span>
                    </div>
                    
                    <div class="d-flex align-items-center gap-3 ps-3 border-start">
                        <img src="assets/img/profile.jpg" alt="profile" class="rounded-circle border"
                            style="width: 40px; height: 40px; object-fit: cover;">
                        <div class="text-start d-none d-sm-block">
                            <p class="mb-0 fw-bold" style="font-size: 14px; color: #1e293b;">Asif Admin</p>
                            <p class="mb-0 text-muted" style="font-size: 12px;">Super Admin</p>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Users Body -->
            <section class="p-4 p-lg-5">
                <header class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-5">
                    <div>
                        <h1 class="font-serif fw-bold h2 mb-2" style="color: #0f172a;">User Management</h1>
                        <p class="text-muted fw-medium mb-0" style="font-size: 16px;">Manage admin panel access and permissions</p>
                    </div>
                    <button class="btn-add-user" id="toggle-add-user">
                        <i data-lucide="plus" style="width: 20px; height: 20px;"></i>
                        <span>Add User</span>
                    </button>
                </header>

                <!-- Add New User Form (Initially Hidden) -->
                <div class="add-user-container d-none" id="add-user-form">
                    <h2 class="add-user-title">Add New User</h2>
                    <form id="new-user-form">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label-custom">Full Name</label>
                                <input type="text" class="form-control-custom" placeholder="e.g. John Smith" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Email Address</label>
                                <input type="email" class="form-control-custom" placeholder="e.g. john@aurahotel.com" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Role</label>
                                <select class="form-control-custom form-select-custom" required>
                                    <option value="" disabled selected>Select user role</option>
                                    <option value="Admin">Admin</option>
                                    <option value="Manager">Manager</option>
                                    <option value="Staff">Staff</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Status</label>
                                <select class="form-control-custom form-select-custom" required>
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Password</label>
                                <input type="password" class="form-control-custom" placeholder="Enter password" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Confirm Password</label>
                                <input type="password" class="form-control-custom" placeholder="Confirm password" required>
                            </div>
                        </div>
                        <div class="d-flex justify-content-end gap-3 mt-5">
                            <button type="button" class="btn-cancel-custom" id="cancel-user-form">Cancel</button>
                            <button type="submit" class="btn-create-custom">Create User</button>
                        </div>
                    </form>
                </div>

                <div class="user-grid" id="users-grid-container">
                    <!-- Dynamic Data Loader via data-handler.js -->
                </div>
            </section>
            
            <!-- Footer -->
            <footer class="p-4 text-center border-top mt-auto bg-white">
                <p class="text-muted small mb-0 fw-medium">
                    &copy; 2026 Admin Panel - AyraHotel. All rights reserved.
                </p>
            </footer>
        </main>
    </div>

    <!-- JS Dependencies -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data-handler.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Initialize Lucide icons on page load
        lucide.createIcons();
    </script>
</body>

</html>
